<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="./styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- JS Code for the interactable menu-->
    <script>
        var menuStatus = false;

        function menuInteraction() {
            var menuContainer = document.getElementById("menu-container").style;
            var menuCoverZone = document.getElementById("menu-cover-zone").style;
            var arrowIcon = document.getElementById("butto-arrow-icon").style;
            var menu = document.getElementById("menu-element").style;

            if(!menuStatus) {
                menuContainer.transform = "scaleX(0)";
                menuContainer.transform = "scaleY(0)";

                menu.visibility = "visible";
                
                menuContainer.transform = "scaleX(1)";
                menuCoverZone.transform = "scaleY(1)";

                arrowIcon.transform = "rotate(180deg)";
                
                menuStatus = true;

            }else {
                menuContainer.transform = "scaleX(0)";
                menuCoverZone.transform = "scaleY(0)";

                arrowIcon.transform = "rotate(360deg)";
                
                menuStatus = false;

                setTimeout(() => {
                    document.getElementById("menu-element").style.visibility = "hidden";
                }, 500)
            }
        }

        function scrollIntro(x) {
            document.documentElement.scrollTop = x;
            menuInteraction();
        }

    </script>


</head>
<body>

    <!-- Side Menu -->

    <button onclick="menuInteraction()" class="side-menu-open-button" style="z-index: 1;">
        <span id="butto-arrow-icon" class="material-symbols-outlined">
            arrow_forward_ios
        </span>
    </button>

    <menu id="menu-element">
        <article id="menu-container" class="side-menu" style="z-index: 1;">
            
            
            <h1 class="font-title side-menu-title">Index</h1>
            
            <section onclick="scrollIntro(0)" class="side-menu-item">
                <h1>Introduction</h1>
            </section>

            <section onclick="scrollIntro(400)" class="side-menu-item">
                <h1>Description</h1>
            </section>

            <section class="side-menu-item">
                <h1>Abilities</h1>
            </section>

            <section class="side-menu-item">
                <h1>Projects</h1>
            </section>

        </article>

        <section onclick="menuInteraction()" id="menu-cover-zone" class="side-menu-cover-zone" style="z-index: 0;"></section>
    </menu>

    <!-- Header -->
    <header>
        <section class="header-title">
            <p style="text-align: center;" class="font-title">Hi, I'm Adrian! ✍</p>
        </section>

        <section class="header-contacts">

            <div class="header-contacts-item">
                <img class="header-contacts-logo" width="50%" src="./Images/email.png"/>
            </div>
    
            <div class="header-contacts-item">
                <img class="header-contacts-logo" width="50%" src="./Images/github.png"/>
            </div>
            
            <div class="header-contacts-item">
                <img class="header-contacts-logo" width="50%" src="./Images/linkedin.png"/>
            </div>

        </section>

    </header>

    <!-- First Section -->
    <section class="section-description">

        <article class="description-frame">
            <div class="description-container">
                <div class="description-number-deco">1</div>
                <div class="description-text-deco">Hi, I'm a software developer</div>

                <div class="description-number-deco">2</div>
                <div class="description-text-deco">Based in Spain</div>

                <div class="description-number-deco">3</div>
                <div class="description-text-deco">Actually Studing Computer Sicence</div>
            
                <div class="description-number-deco">4</div>
                <div class="description-text-deco">And eager to learn new skills and work in a professional enviroment</div>
            </div>
        </article>

        <article class="image-frame">

            <span class="material-symbols-outlined">
                html
            </span>
            <span class="material-symbols-outlined">
                css
            </span>
            <span class="material-symbols-outlined">
                javascript
            </span>
            <span class="material-symbols-outlined">
                php
            </span>

        </article>

    </section>

</body>
</html>
